    provenance: "ByteDance LatentSync v1.5 / v1.6 — primary lip-sync engine per lip_sync/references/latentsync-deployment.md. Open-source latent diffusion for audio-driven lip sync. External (not a Hermes plugin); user deploys per deployment guide."

