# Manual allowlist for models/vendors NOT registered as Hermes plugins.
# Auto-merged with plugin-derived tokens at verify_skill_references.py runtime.
#
# Purpose
# -------
# The scanner at `scripts/verify_skill_references.py` flags any model / vendor
# token in `skills/movie-experts/*/SKILL.md` that does not appear in
# `plugins/image_gen/*/plugin.yaml` or `plugins/video_gen/*/plugin.yaml`.
# This file lists external models that are legitimate CONTEXT references
# (e.g. cited in research, recommended as alternatives, or user-deployed
# outside Hermes) but are NOT shipped as Hermes plugins — so they need an
# explicit manual override to avoid false positives.
#
# CRITICAL: Do NOT add phantom / fabricated tokens here.
#   - `wan22_video` is NOT a Hermes plugin model — keep it flagged.
#   - `168K controlled tokens` is a fabricated concept — keep it flagged.
#   - `flux_1_nsfw` / `flux_1_euler_a` etc. — superseded by FLUX 2 in Hermes,
#     the v1 samplers should be flagged so the AUDIT phase can clean them up.
#
# Phase 5 v1.5 update (2026-06-15):
#   - Production expert + 10 existing experts RAG-uplifted with refs that
#     reference these models by name. Allowlist expanded accordingly.
#   - Phantom strip completed: AudioLDM-2 → Stable Audio Open 1.0;
#     CosyVoice hard-code → multi-provider Hermes catalog; euler_a/dpmpp_2m
#     (FLUX 1.x) → FLUX 2 params; wan2/wan22/wan22_video → Hermes-catalog
#     video gen models. Remaining text references are documentation of the
#     phantom strip process (intentional, not phantom use).
#
# Format
# ------
# - Keep entries lowercase — the scanner normalizes both file content and
#   allowlist to lowercase before comparison.
# - Each entry MUST carry a one-line provenance note explaining where the
#   model comes from or why it is a legitimate context reference.
# - Entries are sorted alphabetically by `name` to minimize merge conflicts.
#
# Provenance categories used in notes:
#   - fal: accessed via plugins/video_gen/fal or plugins/image_gen/fal
#   - external: not a Hermes plugin; user deploys or references externally
#   - open-source: openly available model weights (may be self-hosted)

models:
  - name: cosyvoice
    provenance: "Alibaba CosyVoice 3.0 — SOTA CN emotional TTS; external (NOT in Hermes catalog per Phase 0 GAP-REPORT + research SUMMARY). Phase 5 phantom strip: replaced with Hermes-catalog MiniMax/ElevenLabs/Voxtral/Gemini/Edge/NeuTTS. Residual SKILL.md mentions are documentation of the strip, not active use."

  - name: deepseek
    provenance: "DeepSeek LLM family — referenced as open-weight judge candidate in research SUMMARY (open-weight vs commercial panel discussion)."

  - name: elevenlabs
    provenance: "ElevenLabs Multilingual v2 TTS — Hermes-catalog TTS provider per Phase 5 voicer/cn-tts-model-matrix.md; emotional prosody + voice cloning for main characters."

  - name: flux
    provenance: "Black Forest Labs FLUX family shorthand. Hermes default is FLUX 2 (Klein 9B / Pro) via plugins/image_gen/fal. Bare 'flux' token is a legitimate family reference in skill prose."

  - name: flux2
    provenance: "Black Forest Labs FLUX 2 (Klein 9B / Pro) — current Hermes default via plugins/image_gen/fal (line 372). 'flux2' is a context-only shorthand."

  - name: flux_2
    provenance: "Black Forest Labs FLUX 2 — underscore variant of the shorthand above. Used in skill prose; resolved via fal plugin."

  - name: glm
    provenance: "Zhipu GLM-4 LLM — referenced as open-weight judge candidate and as a CN-context fallback model in screenplay/SKILL.md."

