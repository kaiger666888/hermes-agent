    provenance: "Wav2Lip (Prajwal et al. 2020) — GAN-based lip-sync fallback engine per lip_sync/references/latentsync-deployment.md §Comparison with alternative engines. Used when VRAM < 8GB or processing-time budget < 30s. Open-source."

