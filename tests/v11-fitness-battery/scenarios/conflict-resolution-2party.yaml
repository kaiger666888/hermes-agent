id: conflict-resolution-2party
description: >
  Two memory records in different scopes (session vs global) conflict
  on the same question. Runner must invoke
  agent.memory_arbitration.arbitrate_two_memories and return the
  session-scoped record as the winner (session > global precedence
  per Phase 53 contract). Reuses the
  tests/fixtures/memory-conflict-2conflict.json shape.
input:
  question: "Should the ending of this short-drama be bittersweet or tragic?"
  mem_a:
    record_id: "mem-A-001"
    content: "For THIS specific round, the panel agreed on bittersweet ending."
    scope: "session"
    confidence: 0.78
    evidence_chain:
      - {source_type: "round_table", source_id: "rt-prior-001"}
      - {source_type: "operator_edit", source_id: "op-kai-2026-07-01"}
    evidence_operator_ids: ["kai", "reviewer-1"]
    agent_id: "screenplay"
  mem_b:
    record_id: "mem-B-001"
    content: "Tragedy endings test 23% better across all projects historically."
    scope: "global"
    confidence: 0.95
    evidence_chain:
      - {source_type: "ab_test", source_id: "ab-2025q4"}
    evidence_operator_ids: ["data-pipeline"]
    agent_id: "theory_critic"
expected_output:
  feature: >
    Arbitration result.winner == "a" (session-scoped memory wins over
    global regardless of confidence — scope precedence dominates per
    Phase 53 arbitrate_two_memories contract). Result.reason references
    scope precedence; result.scope_precedence names session > global.
  rationale: >
    Session-scoped decisions reflect the current round-table's specific
    context — they must override stale global statistics. Losing this
    rule collapses every round-table to "what worked historically",
    neutralizing the per-project memory system's value.
scoring_rubric:
  - criterion: "winner == 'a' (session-scoped record)"
    weight: 0.50
  - criterion: "scope_precedence explicitly identifies session > global"
    weight: 0.25
  - criterion: "reason references scope precedence (not confidence)"
    weight: 0.15
  - criterion: "confidence field present in result"
    weight: 0.10
