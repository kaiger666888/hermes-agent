# nodes.yaml — Canonical node definitions for kais-movie-agent v2.0 pipeline
# Source of truth: 00-FIRST-PRINCIPLES.md §4 (Phase 7 derivation) + 01-NODE-DAG.md (Phase 8 topology)
# Rendered as Markdown in 02-NODE-SPECS.md
# Lint script: scripts/validate_design.py (Phase 12 GOV-02)
# Stability: stable (per Phase 7 §1.7)

schema_version: design-2026-06-16-prfp
total_nodes: 16  # 15 linear + 1 consultative
linear_node_count: 15
consultative_node_count: 1
total_cost_per_episode_yuan_range: [7000, 10000]  # within META-05 ceiling ¥1000-10000
total_cost_note: "Complexity-weighted distribution per Phase 8 CONTEXT Area 4/4"

nodes:
  # ============================================
  # Layer 0 — Root
  # ============================================
  - id: creative_source
    name: "Creative Source (创意源)"
    layer: 0
    location: linear
    role: root
    v1_expert_id: creative_source
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.1 (D1.1+D1.2+D1.3+D1.5+D4.1)"
    # === 4 CORE FIELDS (NODE-02) ===
    core_task: "从 6 个社会阶层的生活经验挖故事 kernel,产出整合元意图(logline + 主角欲望 + 中央冲突 + 转折点 + 解决立场 + 风格基因)"
    io_contract:
      inputs:
        - name: creator_anecdote
          type: text
          source: external_human
          required: true
        - name: lived_experience_seed
          type: text
          source: external_human
          required: true
      outputs:
        - name: story_kernel
          type: structured_json
          consumers: [style_genome, screenplay, character_designer]
          required: true
    aigc_transformation: ai_bounded
    aigc_transformation_note: "AI 协助把创作者轶事展开为完整 kernel,但不能替代创作者的 lived experience 输入(per D4.1)"
    traditional_anchor: "传统编剧的 personal-experience mining + 故事 kernel 设计;AIGC 版本显式标记 human-bounded"
    # === 8 STACK SUPPLEMENTARY FIELDS (NODE-03) ===
    success_criteria:
      - metric: kernel_novelty_score
        quantified: ">= 0.7"
        measurement: "trope-catalog embedding similarity against known Save-the-Cat / 短剧爆款公式 patterns"
      - metric: creator_acceptance
        quantified: pass/fail
        measurement: "human creator sign-off"
    fail_modes:
      - mode: cliche_default
        trigger: "LLM defaults to training-data tropes without enough specificity from anecdote"
        impact: "kernel is competent but unoriginal"
      - mode: lived_experience_thin
        trigger: "creator provides brief anecdote without emotional specificity"
        impact: "AI expands to plausible but hollow kernel"
    fallback_strategy:
      - on_fail_mode: cliche_default
        strategy: "increase temperature + add explicit anti-trope constraint in prompt + require ≥3 specific sensory details"
      - on_fail_mode: lived_experience_thin
        strategy: "structured-interview prompt: AI asks 5 follow-up questions to draw out specificity before expanding"
    dependencies:
      hard: []
      soft: []
    complexity_class: O(1)
    ai_capability_assumption: "LLM 在 creative expansion 上稳定(stable_2026);在 truly novel combinatorial creativity 上仍 evolving"
    non_ai_alternative: "纯人类编剧 — 时间成本 ~10x,质量取决于编剧个人"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.1 D1.1+D1.2+D1.3+D1.5 + §3.4 D4.1:观众消费整合体验(D1.1),整合体验需 root 产出(D1.3),元意图必须人类起源(D4.1)"
    # === 3 BUDGET FIELDS (NODE-04 + META-05) ===
    cost_budget:
      yuan_per_episode: 150
      cost_driver: human_time
      distribution_rationale: "主要为人类创作者时间;LLM call 成本可忽略"
    latency_budget:
      seconds: 600
      critical_path: true
    model_horizon: stable_2026
    model_horizon_note: "创意意图起源的 human-bounded 性质不随模型演化"
    # === CURRENT INSTANTIATION (NODE-08 — model names ONLY here) ===
    current_instantiation:
      models:
        - name: "Claude Sonnet 4.5"
          role: "Kernel expansion from creator anecdote + structured interview"
          verified_date: "2026-06-16"
          stability: evolving
      swap_alternatives: ["GPT-5", "GLM-4.6"]
      note: "Canonical spec 是 ai_bounded transformation type,不是 Claude Sonnet 4.5。任何 ≥ Sonnet 4.5 能力的 LLM 都适用。"

  # ============================================
  # Layer 1 — Intent parallel (3-way)
  # ============================================
  - id: style_genome
    name: "Style Genome (风格基因组)"
    layer: 1
    location: linear
    role: intent_parallel
    v1_expert_id: style_genome
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.2 (D2.3+D2.4)"
    core_task: "提取 + 编码 + 复用视觉 DNA(5D style genome:色调 + 构图 + 节奏 + 材质 + 情感基调)作为下游节点的 invariant 输入"
    io_contract:
      inputs:
        - name: story_kernel
          type: structured_json
          source: creative_source
          required: true
      outputs:
        - name: style_genome_5d
          type: structured_vector
          consumers: [cinematographer, prompt_injector, visual_executor, editor, colorist, audio_pipeline]
          required: true
    aigc_transformation: augmentation
    aigc_transformation_note: "AI 辅助从 kernel 提取 style,人类导演确认;5D 编码是 engineering,不是 generation"
    traditional_anchor: "传统 art direction + production design 角色;AIGC 版本显式化为 5D vector"
    success_criteria:
      - metric: aesthetic_alignment
        quantified: ">= 0.7"
        measurement: "downstream node outputs vs style_genome cosine similarity"
      - metric: cross_node_consistency
        quantified: ">= 0.85"
        measurement: "stylistic drift across shots measured by encoder"
    fail_modes:
      - mode: genre_conflation
        trigger: "5D 提取混淆短剧/微电影/长片形态(PITFALLS §6.3)"
        impact: "下游节点形态漂移"
      - mode: over_abstraction
        trigger: "5D vector 过于抽象,下游无法消费"
        impact: "下游节点 revert to defaults,style 不一致"
    fallback_strategy:
      - on_fail_mode: genre_conflation
        strategy: "强制 form_context 输入(短剧/微电影/长片),5D 提取按 form 分桶"
      - on_fail_mode: over_abstraction
        strategy: "5D 提取增加具体 reference image URLs 作为锚点"
    dependencies:
      hard: [creative_source]
      soft: []
    complexity_class: O(1)
    ai_capability_assumption: "style 提取稳定(stable_2026);aesthetic encoder 成熟"
    non_ai_alternative: "人类 art director 手动 5D 编码 — 时间成本 ~5x"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.2 D2.3+D2.4:跨节点 coherence 主导 + invariant ownership 必要,style 是核心 invariant"
    cost_budget:
      yuan_per_episode: 300
      cost_driver: human_time
      distribution_rationale: "AI 提取 + 人类确认"
    latency_budget:
      seconds: 120
      critical_path: true
    model_horizon: stable_2026
    current_instantiation:
      models:
        - name: "Claude Sonnet 4.5"
          role: "Style extraction from kernel + reference alignment"
          verified_date: "2026-06-16"
          stability: stable_2026
      swap_alternatives: ["GPT-5", "Gemini 3 Pro"]
      note: "5D encoding scheme 是 canonical;LLM 仅做 extraction"

  - id: screenplay
    name: "Screenplay (剧本)"
    layer: 1
    location: linear
    role: intent_parallel
    v1_expert_id: screenplay
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.3 (D1.3+D2.1)"
    core_task: "把元意图展开为可执行叙事结构(scene list + dialogue + scene-level intent + 短剧/微电影/长片形态适配)"
    io_contract:
      inputs:
        - name: story_kernel
          type: structured_json
          source: creative_source
          required: true
        - name: form_context
          type: enum
          source: external
          required: true
      outputs:
        - name: screenplay_full
          type: structured_markdown
          consumers: [cinematographer, hook_retention, script_auditor]
          required: true
    aigc_transformation: full_generation
    aigc_transformation_note: "AI 从 kernel 端到端生成 screenplay,script_auditor 后续 critic"
    traditional_anchor: "传统编剧角色 + Field 三幕 + McKee 转折点(validated-invariant 保留)"
    success_criteria:
      - metric: script_auditor_score
        quantified: ">= 0.75 across 5 dimensions"
        measurement: "script_auditor 5-dim audit (character-network, plot-hole, dialogue-naturalness, narrative-arc, setup-payoff)"
      - metric: three_act_compliance
        quantified: "= 100%"
        measurement: "Field 3-act structure check"
    fail_modes:
      - mode: plot_hole
        trigger: "LLM 长程一致性不足,场景间出现矛盾"
        impact: "下游 visual_executor 生成 inconsistent 内容"
      - mode: dialogue_flat
        trigger: "LLM 默认 dialogue 缺乏 subtext"
        impact: "观众感知情感 flat"
      - mode: mid_act_2_sag
        trigger: "Field 三幕中点节奏失守"
        impact: "完播率下降"
    fallback_strategy:
      - on_fail_mode: plot_hole
        strategy: "loop with script_auditor (max 3 iter);if still failing, escalate to human review"
      - on_fail_mode: dialogue_flat
        strategy: "rewrite with explicit subtext constraint + reference dialogue samples"
      - on_fail_mode: mid_act_2_sag
        strategy: "insert explicit midpoint reversal per Field structure"
    dependencies:
      hard: [creative_source]
      soft: [style_genome]
    complexity_class: O(n)
    ai_capability_assumption: "LLM 在 long-form plot consistency 上 evolving;在 short-form 上 stable_2026"
    non_ai_alternative: "人类编剧 — 时间成本 ~10-50x"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.1 D1.3 + §3.2 D2.1:元意图需展开层 + story 质量维度需 owner"
    cost_budget:
      yuan_per_episode: 400
      cost_driver: compute
      distribution_rationale: "LLM call + iteration with script_auditor"
    latency_budget:
      seconds: 300
      critical_path: true
    model_horizon: evolving
    current_instantiation:
      models:
        - name: "Claude Sonnet 4.5"
          role: "Screenplay generation from kernel + form adaptation"
          verified_date: "2026-06-16"
          stability: evolving
      swap_alternatives: ["GPT-5", "GLM-4.6"]
      note: "Long-form plot-hole 检测依赖 script_auditor;模型能力 evolving"

  - id: script_auditor
    name: "Script Auditor (剧本审计)"
    layer: 1
    location: linear
    role: critic_paired
    v1_expert_id: script_auditor
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.4 (D2.5+D3.1(c))"
    core_task: "对 screenplay 做 5-dim quantitative audit,决定 accept/regenerate/escalate"
    io_contract:
      inputs:
        - name: screenplay_full
          type: structured_markdown
          source: screenplay
          required: true
      outputs:
        - name: audit_score_5dim
          type: structured_scores
          consumers: [screenplay]
          required: true
        - name: verdict
          type: enum
          consumers: [screenplay, human_review_gate_1]
          required: true
    aigc_transformation: verification
    aigc_transformation_note: "AI 批判 LLM 输出;5-dim rubric 显式可审"
    traditional_anchor: "传统 script doctor + notes session(人类定性);AIGC 版本 quantitative + decoupled"
    success_criteria:
      - metric: pearson_with_human
        quantified: ">= 0.65"
        measurement: "v1 validation against human reviewer scores"
      - metric: audit_completeness
        quantified: "= 100%"
        measurement: "all 5 dimensions evaluated per audit"
    fail_modes:
      - mode: rubric_bias
        trigger: "LLM-as-judge 把训练 bias 制度化为评分"
        impact: "score 看似客观实为 LLM 偏好"
      - mode: false_positive
        trigger: "audit 标记 plot hole 实为创作者故意"
        impact: "screenplay 不必要重写"
    fallback_strategy:
      - on_fail_mode: rubric_bias
        strategy: "rubric 显式 + Pearson 校准 + 5-dim 评分透明;不作为 ground truth 只作为 regenerate signal"
      - on_fail_mode: false_positive
        strategy: "human review seam (gate 1) captures creator intent override"
    dependencies:
      hard: [screenplay]
      soft: []
    complexity_class: O(1)
    ai_capability_assumption: "LLM-as-judge 在 plot-hole + character-network 上 stable_2026"
    non_ai_alternative: "人类 script doctor — 时间成本 ~5x"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.2 D2.5 + §3.3 D3.1(c):每生成配 critic + AI verification 能力"
    cost_budget:
      yuan_per_episode: 100
      cost_driver: compute
      distribution_rationale: "single LLM call per audit iteration × max 3 iter"
    latency_budget:
      seconds: 60
      critical_path: true
    model_horizon: stable_2026
    current_instantiation:
      models:
        - name: "Claude Haiku 4.5"
          role: "5-dim audit (cost-optimized; Haiku for speed)"
          verified_date: "2026-06-16"
          stability: stable_2026
      swap_alternatives: ["GPT-5-mini", "Claude Sonnet 4.5 (higher precision)"]
      note: "Pearson ≥ 0.65 validation 来自 v1"

  - id: character_designer
    name: "Character Designer (角色设计)"
    layer: 1
    location: linear
    role: intent_parallel
    v1_expert_id: character_designer
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.6 (D2.4)"
    core_task: "定义 + 维护角色 identity asset(face, body, wardrobe, voice profile, behavioral tics)作为跨节点身份一致性 invariant 的 owner"
    io_contract:
      inputs:
        - name: story_kernel
          type: structured_json
          source: creative_source
          required: true
      outputs:
        - name: character_assets
          type: structured_set
          consumers: [cinematographer, prompt_injector, visual_executor, continuity_auditor]
          required: true
    aigc_transformation: full_generation
    aigc_transformation_note: "AI 生成 character design sheets + voice profiles;人类导演 review"
    traditional_anchor: "传统角色设计 + casting 直接适用;AIGC 增加 voice profile + behavioral tics 显式 asset"
    success_criteria:
      - metric: identity_match
        quantified: ">= 0.85 across shots"
        measurement: "continuity_auditor facial-recognition similarity"
      - metric: voice_consistency
        quantified: ">= 0.9 across scenes"
        measurement: "speaker-embedding cosine similarity"
    fail_modes:
      - mode: identity_drift
        trigger: "LoRA + IP-Adapter 当前能力不足以保证 cross-shot identity"
        impact: "观众感知角色变脸"
      - mode: voice_profile_mismatch
        trigger: "TTS voice 不匹配 character description"
        impact: "观众感知违和"
    fallback_strategy:
      - on_fail_mode: identity_drift
        strategy: "loop with continuity_auditor + tighten ControlNet constraints"
      - on_fail_mode: voice_profile_mismatch
        strategy: "regenerate voice profile with explicit prosody constraints"
    dependencies:
      hard: [creative_source]
      soft: []
    complexity_class: O(n)
    ai_capability_assumption: "LoRA + IP-Adapter evolving;voice cloning stable_2026"
    non_ai_alternative: "人类 character designer + voice actor casting — 时间成本 ~10x"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.2 D2.4:身份一致性是 invariant ownership 核心维度"
    cost_budget:
      yuan_per_episode: 300
      cost_driver: compute
      distribution_rationale: "image + voice generation"
    latency_budget:
      seconds: 180
      critical_path: true
    model_horizon: evolving
    current_instantiation:
      models:
        - name: "FLUX 2 + IP-Adapter"
          role: "Character face + body generation"
          verified_date: "2026-06-16"
          stability: evolving
        - name: "CosyVoice 2"
          role: "Voice profile cloning"
          verified_date: "2026-06-16"
          stability: stable_2026
      swap_alternatives: ["Stable Diffusion 4 + IP-Adapter", "ElevenLabs Voice Cloning"]
      note: "Identity lock 机制 evolving;voice cloning 相对成熟"

  # ============================================
  # Layer 2 — Visual intent (2-way)
  # ============================================
  - id: cinematographer
    name: "Cinematographer (摄影指导)"
    layer: 2
    location: linear
    role: visual_intent
    v1_expert_id: cinematographer
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.5 (D2.1+D2.2+D3.4)"
    core_task: "把元意图 + style genome + character assets 翻译为视觉 intent(镜头列表 + 灯光设计 + 构图规范 + composition_lock 锁定)"
    io_contract:
      inputs:
        - name: screenplay
          type: structured_markdown
          source: screenplay
          required: true
        - name: style_genome_5d
          type: structured_vector
          source: style_genome
          required: true
        - name: character_assets
          type: structured_set
          source: character_designer
          required: true
      outputs:
        - name: visual_intent
          type: structured_json
          consumers: [prompt_injector]
          required: true
    aigc_transformation: augmentation
    aigc_transformation_note: "AI 辅助构图建议;composition_lock 是人类 intent 显式化的 user-value 层"
    traditional_anchor: "传统摄影指导角色直接适用;AIGC 版本增加 composition_lock 显式化"
    success_criteria:
      - metric: composition_lock_adherence
        quantified: ">= 0.85"
        measurement: "downstream visual_executor output vs composition_lock constraints"
      - metric: axis_compliance
        quantified: "= 100%"
        measurement: "180° axis rule check by continuity_auditor"
    fail_modes:
      - mode: composition_under_specified
        trigger: "composition_lock 过于宽松,visual_executor 自由度过大"
        impact: "输出 composition 不一致"
      - mode: axis_violation
        trigger: "composition_lock 没有显式 180° 约束"
        impact: "观众空间定向混乱"
    fallback_strategy:
      - on_fail_mode: composition_under_specified
        strategy: "增加 explicit framing rule + reference frame"
      - on_fail_mode: axis_violation
        strategy: "强制 180° axis constraint in composition_lock schema"
    dependencies:
      hard: [screenplay, style_genome, character_designer]
      soft: []
    complexity_class: O(n)
    ai_capability_assumption: "composition advice stable_2026;sketch-then-render instantiation evolving"
    non_ai_alternative: "人类 DP — 时间成本 ~10x"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.2 D2.1+D2.2 + §3.3 D3.4:Murch 视觉维度需 owner + composition_lock 在用户价值层"
    cost_budget:
      yuan_per_episode: 300
      cost_driver: compute
      distribution_rationale: "LLM call for composition advice"
    latency_budget:
      seconds: 120
      critical_path: true
    model_horizon: evolving
    current_instantiation:
      models:
        - name: "Claude Sonnet 4.5"
          role: "Visual intent + composition_lock design"
          verified_date: "2026-06-16"
          stability: evolving
      swap_alternatives: ["GPT-5", "Gemini 3 Pro"]
      note: "sketch-then-render 是当前 instantiation;composition_lock 是 canonical 用户价值"

  - id: prompt_injector
    name: "Prompt Injector (提示注入)"
    layer: 2
    location: linear
    role: visual_intent
    v1_expert_id: NEW
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.7 (D3.5+D2.4)"
    core_task: "把上游人类 intent(元意图 + style + screenplay + 视觉 intent + character assets)翻译为 model-ready prompt(tokens + multimodal refs + 跨 call 一致性 context)"
    io_contract:
      inputs:
        - name: visual_intent
          type: structured_json
          source: cinematographer
          required: true
        - name: style_genome_5d
          type: structured_vector
          source: style_genome
          required: true
        - name: character_assets
          type: structured_set
          source: character_designer
          required: true
      outputs:
        - name: model_prompts
          type: structured_set
          consumers: [visual_executor]
          required: true
        - name: consistency_context
          type: structured_context
          consumers: [visual_executor]
          required: true
    aigc_transformation: ai_native
    aigc_transformation_note: "AI-native 节点 — 无传统对应;prompt 工程本身"
    traditional_anchor: "无传统对应(AI-native)"
    success_criteria:
      - metric: cross_call_consistency
        quantified: ">= 0.85"
        measurement: "downstream visual outputs style/identity consistency"
      - metric: prompt_token_efficiency
        quantified: "<= 4000 tokens per call"
        measurement: "token count vs defined ceiling"
    fail_modes:
      - mode: consistency_drift
        trigger: "consistency context 在多 call 之间丢失"
        impact: "visual_executor 输出 drift"
      - mode: prompt_overload
        trigger: "prompt token 过载,模型注意力分散"
        impact: "关键约束被忽略"
    fallback_strategy:
      - on_fail_mode: consistency_drift
        strategy: "consistency context 显式 carry across calls + repeat key constraints"
      - on_fail_mode: prompt_overload
        strategy: "split prompt into structured sections + use system prompt for stable constraints"
    dependencies:
      hard: [cinematographer, style_genome, character_designer]
      soft: []
    complexity_class: O(1)
    ai_capability_assumption: "prompt engineering stable_2026;cross-call context management evolving"
    non_ai_alternative: "N/A — 无传统对应"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.3 D3.5 + §3.2 D2.4:AI-native 必要节点 + invariant ownership"
    cost_budget:
      yuan_per_episode: 50
      cost_driver: compute
      distribution_rationale: "engineering overhead;minimal model cost"
    latency_budget:
      seconds: 30
      critical_path: true
    model_horizon: stable_2026
    current_instantiation:
      models:
        - name: "Template + few-shot engineering"
          role: "Cross-call consistency context + prompt assembly"
          verified_date: "2026-06-16"
          stability: stable_2026
      swap_alternatives: []
      note: "AI-native engineering;不依赖单一模型"

  # ============================================
  # Layer 3 — Visual execution (with loop)
  # ============================================
  - id: visual_executor
    name: "Visual Executor (视觉执行)"
    layer: 3
    location: linear
    role: visual_exec
    v1_expert_id: NEW_COMPOSITE
    phase7_derivation_ref: "00-FIRST-PRINCIPLES.md §4.8 (D3.1(b)+D2.5)"
    merge_note: "v1 drawer + animator merged; Phase 11 handoff may revisit split"
    core_task: "执行视觉资产生成 — 静态图(drawer sub-task)+ 动态视频(animator sub-task),消费 prompt_injector 输出 + identity asset"
    io_contract:
      inputs:
        - name: model_prompts
          type: structured_set
          source: prompt_injector
          required: true
        - name: consistency_context
          type: structured_context
          source: prompt_injector
          required: true
      outputs:
        - name: generated_visuals
          type: media_assets
          consumers: [audio_pipeline, editor, continuity_auditor]
          required: true
    aigc_transformation: full_generation
    aigc_transformation_note: "AI 生成图像 + 视频;最昂贵的节点"
    traditional_anchor: "传统工业的摄影师 + 动画师;AIGC 压缩合并(per PITFALLS §2.1)"
    success_criteria:
      - metric: identity_match
        quantified: ">= 0.85 across shots"
        measurement: "continuity_auditor facial recognition"
      - metric: aesthetic_alignment
        quantified: ">= 0.7"
        measurement: "vs style_genome encoder"
      - metric: composition_lock_adherence
        quantified: ">= 0.85"
        measurement: "vs cinematographer composition_lock"
    fail_modes:
      - mode: identity_drift
        trigger: "cross-shot identity 锁定失败"
        impact: "观众感知角色变脸"
      - mode: style_drift
        trigger: "style_genome 锚定不足"
        impact: "镜头间风格不一致"
      - mode: temporal_flicker
        trigger: "video gen model 帧间一致性弱"
        impact: "视频 jitter"
      - mode: composition_drift
        trigger: "model 不遵守 composition_lock"
        impact: "构图不符合意图"
    fallback_strategy:
      - on_fail_mode: identity_drift
        strategy: "loop with continuity_auditor (max 2 iter, ¥50/iter ceiling);tighten ControlNet"
      - on_fail_mode: style_drift
        strategy: "regenerate with stronger style_genome encoding + reference image"
      - on_fail_mode: temporal_flicker
        strategy: "switch to more stable model or split into shorter clips"
      - on_fail_mode: composition_drift
        strategy: "regenerate with stricter composition_lock prompt constraints"
    dependencies:
      hard: [prompt_injector]
      soft: []
    complexity_class: O(n)
    ai_capability_assumption: "image gen evolving;video gen evolving rapidly"
    non_ai_alternative: "人类动画师 — 时间成本 ~100x,质量更高"
    rationale_for_existence: "per 00-FIRST-PRINCIPLES.md §3.3 D3.1(b) + §3.2 D2.5:模态转换 AI 加速 + 配 critic"
    cost_budget:
