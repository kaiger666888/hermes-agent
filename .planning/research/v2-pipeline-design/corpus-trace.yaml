        books_synthesized: ["-017 菲尔德《剧本》", "-026 麦基《故事》", "芦苇剧本笔记", "维基·金《如何写出好故事》", "刘天赐《电视剧编剧艺术》", "编剧策略", "奥班农", "温斯顿"]
        applicable_form: universal
        separation:
          principle: "故事 kernel = logline + 主角欲望 + 中央冲突 + 转折点 + 解决立场 (Field 三幕 + McKee 转折点)"
          workflow_obsolete: "Field 的 'sympathy for protagonist in first 10 pages' 是长片时间预算,短剧必须前 3 秒 (translation needed)"
        chinese_terms:
          - term: 故事核 (gù shì hé)
            gloss: story kernel
            untranslatable_flag: false
          - term: 转折点 (zhuǎn zhé diǎn)
            gloss: turning point (McKee)
            untranslatable_flag: false
        principle_vs_workflow_separated: true
        last_verified: 2026-06-16
        citation_strength: medium
        form_translation_note: "Field 三幕是 universal principle;但 'sympathy page count' 是 长片 时间预算,不适用于 短剧"
      - source_type: hermes_ref
        source_id: "PC-film-philosophy-bazin-tarkovsky.md"
        source_title: "Film philosophy — Bazin / Tarkovsky / 七部半"
        books_synthesized: ["巴赞《电影是什么》", "塔可夫斯基《雕刻时光》", "七部半"]
        applicable_form: universal
        separation:
          principle: "创作者 personal vision 是元意图的不可替代源头 (auteur theory)"
          workflow_obsolete: "Bazin 的 'long-take realism' 是 长片 美学主张,不是 kernel 提取的方法论"
        chinese_terms:
          - term: 作者论 (zuò zhě lùn)
            gloss: auteur theory
            untranslatable_flag: false
        principle_vs_workflow_separated: true
        last_verified: 2026-06-16
        citation_strength: strong
    challenge_source:
      source_id: "PC-narrative-revolution-and-modernism.md (本雅明 / 阿多诺 反对立场)"
      source_title: "Narrative revolution + modernism (Benjamin / Adorno against auteur-intent essentialism)"
      disagreement_summary: "本雅明《机械复制时代的艺术作品》挑战作者意图神圣性:机械复制后,作品的'灵韵'(Aura)消散,作者意图不再是意义中心"
      design_response: "我们承认 auteur essentialism 在机械复制时代部分解构,但 v2.0 节点是 AI 辅助生成,创作者的 lived experience 仍提供不可替代的 novelty pressure (per D4.1)。我们不回归'作者即上帝',而是把作者 intent 作为 AI 不能替代的 novelty 锚点"
      last_verified: 2026-06-16
    aigc_native_flag:
      value: false
      rationale: "传统编剧有 personal-experience mining 传统,该节点有明确 corpus 锚点"

