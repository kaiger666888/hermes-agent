# Hermes Memory Record Schema (v10.0)
#
# Independent schema for memory records stored in mem0 backend (per-agent namespace).
#
# NOT a sub-schema of agents-schema.yaml — see design doc §1.3 + §3.0 for the
# 2-layer rationale (CC-2 mandate).
#
# Sources:
#   - SUMMARY.md CC-2 (the 10 fields that don't fit in 18-field agent YAML)
#   - PITFALLS.md §P1 (persona drift → persona_sha256 snapshot in every record)
#   - PITFALLS.md §P2 (stale memory → expires_at + verified_at + supersedes_memory_id
#                       + confidence + half_life_days)
#   - PITFALLS.md §P4 (cross-project leakage → scope: global|project|session
#                       + project_id required)
#   - PITFALLS.md §P5 (curator failure modes → evidence_chain ≥ 3
#                       + evidence_operator_ids diversity + dry-run-by-default)
#   - PITFALLS.md §P6 (memory poisoning → status="quarantined" for incident response)
#   - PITFALLS.md §P10 (privacy / data leakage → confidentiality field)
#   - PITFALLS.md §P14 (schema migration → schema_version field)
#   - SUMMARY.md OQ-1 (persona_sha256 snapshot for drift detection)
#   - SUMMARY.md OQ-4 (confidence default 0.5 = neutral)
#   - SUMMARY.md OQ-7 (memory.max_records cap lives at agent tier level, see §4 of design doc)
#
# Consumers:
#   - v11.0 PoC Python dataclass generator
#   - Phase 51 VALIDATE-02 lint script
#   - curator `_memory_evolution_phase` (writes records conforming to this schema)
#   - mem0 backend per-agent namespace (stores records as JSON)
#   - 02-ROUND-TABLE-PROTOCOL.md (consumes scope + confidentiality + status for arbitration)
#
# This is Layer 2 of the 2-layer schema split (CC-2 mandate).
# Layer 1 (agents-schema.yaml) is INDEPENDENT — see design doc §1.3 + §2.
#
# Stability: §3 of design doc locks all 10 mandated fields; new fields require
# opening a new design-revision milestone (P14 schema_version bump).

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://hermes-agent.local/v10/memory-record-schema.yaml"
title: "Hermes Memory Record Schema (v10.0)"
description: |
  Independent schema for memory records stored in mem0 backend (per-agent namespace).
  NOT a sub-schema of agents-schema.yaml — see design doc §1.3 + §3.0 for the
  2-layer rationale (CC-2 mandate).
  The 10 mandated fields encode per-record invariants: time-decay (P2),
  provenance (P5/P6), scope isolation (P4), privacy (P10), and lifecycle (P2/P5/P6).
  Cross-layer invariants (persona_sha256, schema_version) link each record to its
  owning agent and to the migration-time schema version.

type: object
required:
  - record_id
  - agent_id
  - scope
  - status
  - confidence
  - evidence_chain
  - created_at
  - persona_sha256
additionalProperties: false  # P14 mitigation — reject undeclared fields

properties:

  # ──────────────────────────────────────────────────────────────────────
  # Identity & routing
  # ──────────────────────────────────────────────────────────────────────

  record_id:
    type: string
    description: |
      Unique identifier for this memory record.
      UUID v4 recommended (generated by curator at write time).
      Used by supersedes_memory_id (§3.3) to form supersession chains.

  agent_id:
    type: string
    pattern: "^[a-z0-9_-]+$"
    description: |
      Owner agent. Routes record to per-agent mem0 namespace via agent_id filter
      (ARCHITECTURE §3.2 Option B). MUST match the `name` field of an agent in
      agents-schema.yaml.
      Source: ARCHITECTURE §3.1 (mem0 user_id + agent_id filter model).

  # ──────────────────────────────────────────────────────────────────────
  # §3.9 — Scope (P4 cross-project leakage mitigation, finer than agent memory_scope)
  # ──────────────────────────────────────────────────────────────────────

  scope:
    type: string
    enum: [global, project, session]
    description: |
      Visibility scope for this memory record.
      Source: PITFALLS §P4 mitigation 1 (three-tier scoping).
      FINER than agents-schema.yaml memory_scope (shared|per_agent|project_scoped) —
        memory_scope routes records by agent_id; THIS field governs cross-project
        VISIBILITY at retrieve time.
      Values:
        - global: applies to all projects (e.g. "FLUX 2 generates better faces
            than FLUX 1"). Eligible for cross-project retrieval.
        - project: scoped to one project (e.g. "this project's protagonist is
            introspective, prefers muted palette"). Retrieve ONLY when project_id
            matches the current context.
        - session: ephemeral, single-conversation (mirrors current mem0 run_id
            semantics; not persisted across sessions).
      Default = project (PITFALLS §P4 mitigation 2: conservative default prevents
        inappropriate cross-project transfer).

  project_id:
    type: [string, "null"]
    description: |
      REQUIRED when scope=project. NULL otherwise.
      Format: "{repo_basename}:{git_toplevel_sha8}" (mirrors ARCHITECTURE §5.1
      project_slug convention).

  session_id:
    type: [string, "null"]
    description: |
      REQUIRED when scope=session. NULL otherwise.
      Opaque session identifier (typically a UUID generated per round table or
      per CLI session).

  # ──────────────────────────────────────────────────────────────────────
  # §3.8 — Status (P5/P6 curator failure modes + memory poisoning)
  # ──────────────────────────────────────────────────────────────────────

  status:
    type: string
    enum: [active, archived, quarantined, superseded]
    default: active
    description: |
      Lifecycle status of this memory record.
      Source: PITFALLS §P5/P6 mitigation 1 (never hard-delete).
      Values:
        - active: eligible for retrieval and cited by agents in their output
        - archived: excluded from default retrieval, but kept for audit
            (P5 mitigation 1: "curator can only archive, never hard-delete")
        - quarantined: under review (bias canary flagged, poisoning suspected,
            or operator disputed). Excluded from retrieval until operator
            resolves (P5 mitigation 6 + P6 mitigation 6).
        - superseded: replaced by a newer record via supersedes_memory_id chain.
            Excluded from retrieval, but kept for audit (P2 mitigation 4).

  # ──────────────────────────────────────────────────────────────────────
  # §3.5 — Confidence (P2 stale memory time-decay + OQ-4 neutral 0.5)
  # ──────────────────────────────────────────────────────────────────────

  confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
    default: 0.5
    description: |
      Curator-assigned confidence in this record's correctness.
      Source: PITFALLS §P2 mitigation 5 (time-decay applied to confidence).
      OQ-4 resolution (cold start): default 0.5 = neutral; mirrors fitness_score
        null→0.5 mapping in agents-schema.yaml.
      Time-decay formula (computed at retrieve time):
        confidence(now) = base_confidence * exp(-age_days / half_life_days)
      Below confidence=0.1 → auto-archived by compaction pass (§4.5 of design doc).

  # ──────────────────────────────────────────────────────────────────────
  # §3.4 — Half-life (P2 stale memory time-decay)
  # ──────────────────────────────────────────────────────────────────────

  half_life_days:
    type: integer
    minimum: 1
    default: 90
    description: |
      Days for confidence to halve under the time-decay formula.
      Source: PITFALLS §P2 mitigation 5.
      Domain-rule memories (platform guidelines, model APIs, tool versions):
        half_life_days = 90 (default — short half-life, fast decay).
      Preference memories (operator tastes, project conventions):
        half_life_days = 3650 (long half-life, slow decay).
      Curator's memory-write path infers half_life_days from the LLM aggregation
        step's classification (domain-rule vs preference).

  # ──────────────────────────────────────────────────────────────────────
  # §3.1 — Expires_at (P2 hard expiry)
  # ──────────────────────────────────────────────────────────────────────

  expires_at:
    type: [string, "null"]
    format: date-time
    description: |
      Hard expiry timestamp. After this timestamp, status auto-flips to archived
      by the compaction pass (§4.5 of design doc).
      Source: PITFALLS §P2 mitigation 1.
      NULL = no hard expiry (typical for preference memories).
      Domain-rule memories: expires_at = now + 90 days (PITFALLS §P2 mitigation 1).
      Retrieve-time filter: WHERE expires_at IS NULL OR expires_at > now().

  # ──────────────────────────────────────────────────────────────────────
  # §3.2 — Verified_at (P2 periodic re-verification)
  # ──────────────────────────────────────────────────────────────────────

  verified_at:
    type: [string, "null"]
    format: date-time
    description: |
      Last human/curator verification timestamp.
      Source: PITFALLS §P2 mitigation 2 (mirrors v1 ref verified_date convention).
      Curator's periodic re-verification pass walks memories with
        verified_at older than 90 days and flags them for re-verification.
      NULL = never verified (initial state at write time).

  # ──────────────────────────────────────────────────────────────────────
  # §3.3 — Supersedes_memory_id (P2 supersession chain)
  # ──────────────────────────────────────────────────────────────────────

  supersedes_memory_id:
    type: [string, "null"]
    description: |
      Points to the record_id this one replaces. Forms supersession chain.
      Source: PITFALLS §P2 mitigation 4 (extends v6.0 _superseded_record_ids).
      Example: screenplay learns "FLUX 2 replaces FLUX 1.x" → curator writes a
        new memory with supersedes_memory_id=<old FLUX 1 memory's record_id>.
      Retrieve-time filter: exclude records where another active record's
        supersedes_memory_id points to them (status auto-set to "superseded").

  # ──────────────────────────────────────────────────────────────────────
  # §3.6 — Evidence chain (P5 curator hallucination guard)
  # ──────────────────────────────────────────────────────────────────────

  evidence_chain:
    type: array
    min_items: 3
    items:
      type: object
      required: [source_type, source_id, timestamp]
      additionalProperties: false
      properties:
        source_type:
          type: string
          enum: [feedback, eval_gate, operator_edit, round_table, external]
          description: |
            Type of evidence source.
            - feedback: FeedbackRecord (v6.0 feedback_store.py)
            - eval_gate: eval gate verdict (_eval/gate.py)
            - operator_edit: explicit operator instruction (logged)
            - round_table: round table conclusion (02-ROUND-TABLE-PROTOCOL.md)
            - external: external source (URL, paper, doc — logged with URL/SHA)
        source_id:
          type: string
          description: |
            Identifier for the evidence (e.g. feedback record SHA, eval gate
            run_id, round_table_id, URL, or commit SHA).
        timestamp:
          type: string
          format: date-time
          description: "When the evidence was generated."
        excerpt:
          type: string
          description: "Optional excerpt of the evidence (for audit readability)."
    description: |
      ≥3 independent sources required before curator promotes a memory.
      Source: PITFALLS §P5 mitigation 2 (hallucination guard: citation coverage ≥ 3).
      The curator's LLM is prompted to cite evidence; post-hoc,
        _check_evidence_coverage(new_memory, evidence_chain) verifies each cited
        record's text actually overlaps the new memory semantically (embedding
        cosine ≥ 0.7). Failures are rejected (record not written).

  # ──────────────────────────────────────────────────────────────────────
  # §3.7 — Evidence operator IDs (P5 bias amplification guard)
  # ──────────────────────────────────────────────────────────────────────

  evidence_operator_ids:
    type: array
    min_items: 1
    items:
      type: string
    description: |
      Operators who contributed evidence in evidence_chain.
      Source: PITFALLS §P5 mitigation 3 (operator diversity score).
      Curator's pre-write check: _check_operator_diversity(evidence_chain, 2)
        requires ≥2 distinct operators before generating an insight. Single-operator
        feedback cannot drive automated memory writes.
      Bias audit log: every memory write records evidence_operator_ids + count;
        hermes curator stats --bias-audit surfaces over-represented operators.

  # ──────────────────────────────────────────────────────────────────────
  # §3.10 — Confidentiality (P10 privacy / data leakage)
  # ──────────────────────────────────────────────────────────────────────

  confidentiality:
    type: string
    enum: [public, internal, confidential, restricted]
    default: internal
    description: |
      Propagation rule across projects/sessions.
      Source: PITFALLS §P10 mitigation 2.
      Values:
        - public: can be surfaced in any context (including public-facing round
            tables). Default for universally-applicable domain rules.
        - internal: default for new memories. Surfaced only within operator's
            own Hermes deployment. NOT surfaced in cross-workspace contexts.
        - confidential: project-specific sensitive info. Excluded from
            cross-project retrieval even if scope=global. Round-table coordinator
            must redact or exclude when confidentiality > project's level.
        - restricted: NDA / PII / secrets. Excluded from all automated retrieval.
            Only surfaced via explicit operator command
            `hermes agent memory recall --include-restricted`. Default for
            project-codename-tagged memories.
      v11.0 PoC ships with public/internal/confidential; `restricted` tier +
        PII vault deferred to v11.1 (see §7.2 P10 row "PoC must-fix?").

  # ──────────────────────────────────────────────────────────────────────
  # §3.11 — Persona_sha256 (OQ-1 resolution, P1 cross-layer drift detection)
  # ──────────────────────────────────────────────────────────────────────

  persona_sha256:
    type: string
    pattern: "^[a-f0-9]{64}$"
    description: |
      SHA-256 of the agent's persona fragment AT THE TIME this record was written.
      Source: OQ-1 resolution (Phase 44 SUMMARY) + PITFALLS §P1 mitigation 4.
      Cross-layer invariant for P1 persona drift detection:
        - at recall time, if this record's persona_sha256 ≠ current agent YAML
          persona sha256 → flag for re-verification (operator may have hand-edited
          persona; record may no longer apply)
        - weight memory by persona_version_match ? 1.0 : 0.3 at retrieve time
          (PITFALLS §P1 mitigation 4: "memory written under persona v1 doesn't
          dominate behavior under persona v2").

  # ──────────────────────────────────────────────────────────────────────
  # Audit fields (retrieval analytics)
  # ──────────────────────────────────────────────────────────────────────

  created_at:
    type: string
    format: date-time
    description: "When this record was first written."

  last_recalled_at:
    type: [string, "null"]
    format: date-time
    description: |
      Last time this record was returned by a retrieve call. NULL if never recalled.
      Used by compaction pass to identify "stale" records (long recall gap).

  recall_count:
    type: integer
    minimum: 0
    default: 0
    description: |
      Number of times this record has been returned by a retrieve call.
      Used by compaction pass — low recall_count + high age → demote to archival.

  # ──────────────────────────────────────────────────────────────────────
  # §3.12 — Schema_version (P14 schema migration)
  # ──────────────────────────────────────────────────────────────────────

  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    default: "1.0.0"
    description: |
      Version of the memory-record schema this record conforms to.
      Source: PITFALLS §P14 mitigation 1.
      Migration job backfills unknown fields with safe defaults (P14 mitigation 2:
        "default unknown fields to the safest value, not the most permissive" —
        e.g. unknown confidentiality → confidential, not public).
      Migration dry-run: `hermes agent memory migrate --dry-run`
        (P14 mitigation 3, see 04-MIGRATION-PATH.md).
      v11.0 PoC ships with schema_version="1.0.0". Subsequent field additions
        bump this in lockstep with agents-schema.yaml version.

  # ──────────────────────────────────────────────────────────────────────
  # Content (the actual memory fact)
  # ──────────────────────────────────────────────────────────────────────

  content:
    type: string
    description: |
      The memory fact itself (natural-language string, mem0-style).
      Example: "After Volvo S1-1 case 2026-06-28, cinematographer learned to
      always include 'left-hand drive, steering wheel on the left side' for
      car-interior shots."
      Curator's LLM aggregation generates this from evidence_chain; the
        post-hoc _check_evidence_coverage step verifies semantic overlap.
